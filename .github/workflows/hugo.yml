name: Deploy Hugo site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:        # allow manual runs from the Actions tab

# Least-privilege token scoped to what Pages deployment needs
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-flight production deploy
concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Pin to match local Fedora package for reproducible builds.
      HUGO_VERSION: 0.162.1
    steps:
      - name: Install Hugo CLI (extended)
        run: |
          wget -O "${{ runner.temp }}/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${{ runner.temp }}/hugo.deb"
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive   # PaperMod is a submodule — required or build fails
          fetch-depth: 0          # full history so .GitInfo / .Lastmod work
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        # baseURL is fixed to the custom domain (matches hugo.toml); drafts
        # stay unpublished because we do NOT pass -D.
        run: hugo --gc --minify --baseURL "https://ademar.org/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
