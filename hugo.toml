baseURL = 'https://ademar.org/'
locale = 'en-us'
title = 'Ademar Reis'
theme = 'PaperMod'

# PaperMod wants these enabled for full functionality
enableRobotsTXT = true
enableInlineShortcodes = true

[params]
  description = 'Director of Software Engineering at Red Hat, leading Azure Red Hat OpenShift. Twenty-five years on Linux, cloud infrastructure, and open source.'
  author = 'Ademar Reis'
  defaultTheme = 'auto'        # respects the visitor's light/dark OS setting
  ShowReadingTime = true
  ShowShareButtons = false
  ShowCodeCopyButtons = true
  ShowToc = true               # table of contents, useful for long-form essays
  ShowFullTextinRSS = true     # emit full post body in RSS (<content:encoded>),
                               # not just the summary -- lets feed readers and
                               # AI crawlers ingest the whole post

  # Site-wide footer disclaimer. Renders on every page (home, About, posts)
  # right before the "Powered by Hugo" line, via PaperMod's footer.text hook.
  # No template override needed.
  [params.footer]
    text = "Opinions here are my own and do not represent my employer."

  # Schema.org / JSON-LD structured data (consumed by PaperMod's
  # schema_json.html). This is a personal site, so the publisher is a Person,
  # not an Organization -- this drives the home page's @type and helps search
  # engines and AI crawlers resolve "this site = the human Ademar Reis".
  # sameAs lists identity/profile URLs only (no mailto) for entity linking.
  [params.schema]
    publisherType = "Person"
    sameAs = [
      "https://www.linkedin.com/in/ademarreis/",
      "https://github.com/adereis",
    ]

  # "profile" landing mode = centered headshot + bio + buttons,
  # i.e. a faithful rebuild of the original ademar.org home page.
  [params.profileMode]
    enabled = true
    title = 'Ademar Reis'
    subtitle = "Director of Software Engineering at Red Hat, leading Azure Red Hat OpenShift. Twenty-five years on Linux, from desktop distributions to managed Kubernetes in the cloud."
    imageUrl = '/img/headshot-web.jpg'
    imageTitle = 'Ademar Reis'
    imageWidth = 160
    imageHeight = 160

    [[params.profileMode.buttons]]
      name = 'Email'
      url = 'mailto:ademar@ademar.org'
    [[params.profileMode.buttons]]
      name = 'LinkedIn'
      url = 'https://www.linkedin.com/in/ademarreis/'
    [[params.profileMode.buttons]]
      name = 'GitHub'
      url = 'https://github.com/adereis'

  # Social icons shown in the header/footer
  [[params.socialIcons]]
    name = 'email'
    url = 'mailto:ademar@ademar.org'
  [[params.socialIcons]]
    name = 'linkedin'
    url = 'https://www.linkedin.com/in/ademarreis/'
  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/adereis'

# Top navigation menu. About is live; Posts stays commented out until there's
# a published post (an empty /posts list reads as unfinished). Re-add Posts
# here when the first real post lands:
#   [[menu.main]]
#     name = 'Posts'
#     url = '/posts/'
#     weight = 10
[[menu.main]]
  name = 'About'
  url = '/about/'
  weight = 20

# AI / LLM crawling: expose the site as plain Markdown.
#   /llms.txt      -> a curated index (title, summary, links to every page)
#   /llms-full.txt -> the raw Markdown body of every page, concatenated
# This is the emerging convention (https://llmstxt.org) for letting LLMs
# consume a site without parsing HTML. Both are generated by the templates
# layouts/home.llms.txt and layouts/home.llms-full.txt from existing content.
[outputFormats]
  [outputFormats.llms]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
    rel = "alternate"
  [outputFormats.llms-full]
    mediaType = "text/plain"
    baseName = "llms-full"
    isPlainText = true
    rel = "alternate"

# Override the home page's outputs to add the two LLM formats. HTML and RSS
# must be listed explicitly or Hugo drops them.
[outputs]
  home = ["HTML", "RSS", "llms", "llms-full"]

# Syntax highlighting / Markdown rendering
[markup]
  [markup.highlight]
    noClasses = false          # use CSS classes so theme dark/light works
  [markup.goldmark.renderer]
    unsafe = true              # allow raw HTML in Markdown when needed
